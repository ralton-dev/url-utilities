{{- if not .Values.secrets.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "url-utilities.fullname" . }}
  labels:
    {{- include "url-utilities.labels" . | nindent 4 }}
type: Opaque
stringData:
  API_KEY: {{ required "secrets.API_KEY is required when secrets.existingSecret is empty" .Values.secrets.API_KEY | quote }}
  POSTGRES_URL: {{ required "secrets.POSTGRES_URL is required when secrets.existingSecret is empty" .Values.secrets.POSTGRES_URL | quote }}
{{- end }}
